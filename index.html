<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OmniLang — Universal Translator</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
</head>
<body>

<div class="wrap">

  <div class="header">
    <div class="logo"><i class="ti ti-world"></i></div>
    <div>
      <div class="brand">Omni<span>Lang</span></div>
      <div class="sub">Universal speech &amp; text translator</div>
    </div>
  </div>

  <div class="lang-row">

      <option value="sw">Swahili</option>
      <option value="he">Hebrew</option>
      <option value="ro">Romanian</option>

      <option value="cs">Czech</option>
      <option value="el">Greek</option>

      <option value="bg">Bulgarian</option>
      <option value="sr">Serbian</option>
      <option value="lt">Lithuanian</option>
      <option value="lv">Latvian</option>
      <option value="et">Estonian</option>
      <option value="sl">Slovenian</option>
      <option value="ka">Georgian</option>
      <option value="hy">Armenian</option>
      <option value="az">Azerbaijani</option>
      <option value="kk">Kazakh</option>
      <option value="uz">Uzbek</option>
      <option value="mn">Mongolian</option>
      <option value="ne">Nepali</option>
      <option value="si">Sinhala</option>
      <option value="km">Khmer</option>
      <option value="lo">Lao</option>
      <option value="my">Burmese</option>
      <option value="am">Amharic</option>
      <option value="yo">Yoruba</option>
      <option value="ig">Igbo</option>
      <option value="ha">Hausa</option>
      <option value="zu">Zulu</option>
      <option value="af">Afrikaans</option>
      <option value="cy">Welsh</option>
      <option value="ga">Irish</option>
      <option value="eu">Basque</option>
      <option value="ca">Catalan</option>
      <option value="gl">Galician</option>
      <option value="la">Latin</option>
      <option value="eo">Esperanto</option>
    </select>
    <button class="swap-btn" id="swapBtn" title="Swap languages">
      <i class="ti ti-arrows-exchange"></i>
    </button>
    <select id="tgtLang">
      <option value="hi">Hindi</option>
      <option value="en">English</option>
      <option value="zh">Chinese (Mandarin)</option>
      <option value="es">Spanish</option>
      <option value="ar">Arabic</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
      <option value="pt">Portuguese</option>
      <option value="ru">Russian</option>
      <option value="it">Italian</option>
      <option value="tr">Turkish</option>
      <option value="nl">Dutch</option>
      <option value="pl">Polish</option>
      <option value="sv">Swedish</option>
      <option value="th">Thai</option>
      <option value="vi">Vietnamese</option>
      <option value="id">Indonesian</option>
      <option value="fa">Persian</option>
      <option value="uk">Ukrainian</option>
      <option value="bn">Bengali</option>
      <option value="ta">Tamil</option>
      <option value="te">Telugu</option>
      <option value="mr">Marathi</option>
      <option value="gu">Gujarati</option>
      <option value="pa">Punjabi</option>
      <option value="ur">Urdu</option>
      <option value="ms">Malay</option>
      <option value="sw">Swahili</option>
      <option value="he">Hebrew</option>
      <option value="ro">Romanian</option>
      <option value="hu">Hungarian</option>
      <option value="cs">Czech</option>
      <option value="el">Greek</option>
      <option value="fi">Finnish</option>
      <option value="no">Norwegian</option>
      <option value="da">Danish</option>
      <option value="sk">Slovak</option>
      <option value="hr">Croatian</option>
      <option value="bg">Bulgarian</option>
      <option value="sr">Serbian</option>
      <option value="lt">Lithuanian</option>
      <option value="lv">Latvian</option>
      <option value="et">Estonian</option>
      <option value="sl">Slovenian</option>
      <option value="ka">Georgian</option>
      <option value="hy">Armenian</option>
      <option value="az">Azerbaijani</option>
      <option value="kk">Kazakh</option>
      <option value="uz">Uzbek</option>
      <option value="mn">Mongolian</option>
      <option value="ne">Nepali</option>
      <option value="si">Sinhala</option>
      <option value="km">Khmer</option>
      <option value="lo">Lao</option>
      <option value="my">Burmese</option>
      <option value="am">Amharic</option>
      <option value="yo">Yoruba</option>
      <option value="ig">Igbo</option>
      <option value="ha">Hausa</option>
      <option value="zu">Zulu</option>
      <option value="af">Afrikaans</option>
      <option value="cy">Welsh</option>
      <option value="ga">Irish</option>
      <option value="eu">Basque</option>
      <option value="ca">Catalan</option>
      <option value="gl">Galician</option>
      <option value="la">Latin</option>
      <option value="eo">Esperanto</option>
    </select>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-label">Input</span>
        <div class="panel-actions">
          <button class="icon-btn" id="micBtn" title="Speak to translate">
            <i class="ti ti-microphone"></i>
          </button>
          <button class="icon-btn" id="clearBtn" title="Clear input">
            <i class="ti ti-x"></i>
          </button>
        </div>
      </div>
      <textarea id="inputText" placeholder="Type or speak your text here… (Ctrl+Enter to translate)" rows="6"></textarea>
      <div class="panel-footer">
        <span class="char-count" id="charCount">0 / 5000</span>
        <div class="confidence" id="micConf" style="display:none">
          <span>STT confidence</span>
          <div class="conf-bar"><div class="conf-fill" id="confFill" style="width:0%"></div></div>
          <span id="confPct">0%</span>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-label">Translation</span>
        <div class="panel-actions">
          <button class="icon-btn" id="speakBtn" title="Speak translation">
            <i class="ti ti-volume"></i>
          </button>
          <button class="icon-btn" id="copyBtn" title="Copy translation">
            <i class="ti ti-copy"></i>
          </button>
        </div>
      </div>
      <textarea id="outputText" placeholder="Translation appears here…" rows="6" readonly></textarea>
      <div class="panel-footer">
        <span class="char-count" id="outCharCount">0 chars</span>
      </div>
    </div>
  </div>

  <button class="translate-btn" id="translateBtn">
    <i class="ti ti-language"></i> Translate
  </button>

  <div class="feature-row">
    <div class="feat"><i class="ti ti-microphone"></i>Speech-to-text</div>
    <div class="feat"><i class="ti ti-volume"></i>Text-to-speech</div>
    <div class="feat"><i class="ti ti-world"></i>70+ languages</div>
    <div class="feat"><i class="ti ti-cpu"></i>AI-powered</div>
  </div>

  <div class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Ready — type, speak, or paste text to begin</span>
  </div>

  <div class="history-section" id="historySection" style="display:none">
    <div class="history-title">
      <i class="ti ti-history"></i> Recent translations
    </div>
    <div id="historyList"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
